name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag matching Cargo.toml (for example v0.1.0)
        required: true
        type: string
      prerelease:
        description: Mark the GitHub Release as a prerelease
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  metadata:
    name: Release metadata
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      prerelease: ${{ steps.release.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v5

      - name: Validate release tag against application version
        id: release
        shell: bash
        env:
          MANUAL_TAG: ${{ inputs.tag }}
          MANUAL_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          version="$(awk '
            /^\[workspace.package\]$/ { in_workspace_package=1; next }
            /^\[/ && in_workspace_package { exit }
            in_workspace_package && /^version = / {
              gsub(/"/, "", $3)
              print $3
              exit
            }
          ' Cargo.toml)"
          test -n "$version"

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            tag="$MANUAL_TAG"
            prerelease="${MANUAL_PRERELEASE:-false}"
          else
            tag="$GITHUB_REF_NAME"
            prerelease="false"
          fi

          expected="v${version}"
          if [[ "$tag" != "$expected" ]]; then
            echo "Release tag '$tag' must match application version '$expected'." >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

  verify:
    name: Verify Rust workspace
    needs: metadata
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-features

  windows:
    name: Archive Windows x64
    needs: [metadata, verify]
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build staged Windows package
        shell: pwsh
        run: .\scripts\build.ps1 -Clean -Arch x64

      - name: Create ZIP archive
        shell: pwsh
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          $archive = "reDrover-$env:VERSION-windows-x64.zip"
          Compress-Archive -Path build-output\* -DestinationPath $archive -Force

      - uses: actions/upload-artifact@v7
        with:
          name: reDrover-${{ needs.metadata.outputs.version }}-windows-x64
          path: reDrover-${{ needs.metadata.outputs.version }}-windows-x64.zip
          if-no-files-found: error

  posix:
    name: Archive ${{ matrix.platform }}
    needs: [metadata, verify]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux-x64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
          - os: macos-15
            platform: macos-arm64
    steps:
      - uses: actions/checkout@v5

      - name: Install build tools (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu-')
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-13 g++-13 cmake
          echo "CC=gcc-13" >> "$GITHUB_ENV"
          echo "CXX=g++-13" >> "$GITHUB_ENV"

      - name: Build staged POSIX package
        shell: bash
        run: |
          chmod +x scripts/build.sh
          ./scripts/build.sh --clean --skip-gui

      - name: Create tar.gz archive
        shell: bash
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          tar -czf "reDrover-${VERSION}-${PLATFORM}.tar.gz" -C build-output .

      - uses: actions/upload-artifact@v7
        with:
          name: reDrover-${{ needs.metadata.outputs.version }}-${{ matrix.platform }}
          path: reDrover-${{ needs.metadata.outputs.version }}-${{ matrix.platform }}.tar.gz
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [metadata, windows, posix]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish archives from workflow artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.metadata.outputs.tag }}
          VERSION: ${{ needs.metadata.outputs.version }}
          PRERELEASE: ${{ needs.metadata.outputs.prerelease }}
        run: |
          ls -la release-assets

          if gh release view "$TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" release-assets/* --repo "$GH_REPO" --clobber
            exit 0
          fi

          args=(
            release create "$TAG" release-assets/*
            --repo "$GH_REPO"
            --target "$GITHUB_SHA"
            --title "reDrover $VERSION"
            --generate-notes
          )
          if [[ "$PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi
          gh "${args[@]}"
