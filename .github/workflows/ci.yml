name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  rust:
    name: Rust ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: x64
          - os: ubuntu-24.04-arm
            arch: arm64
          - os: windows-2025
            arch: x64
          - os: windows-11-arm
            arch: arm64
          - os: macos-15
            arch: arm64
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-features

      - name: cargo build (release)
        run: cargo build --workspace --release

  native-windows:
    # MinHook is an x86/x64 hook engine; there is no working Windows ARM64
    # native shim until the hook backend is replaced or extended.
    name: Native DLL (Windows x64)
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v6

      - name: Configure CMake
        run: cmake -S dll -B dll/build -A x64

      - name: Build
        run: cmake --build dll/build --config Release

      - name: Verify version.dll forwards
        shell: pwsh
        run: |
          $dumpbin = (Get-ChildItem -Recurse -Path "C:/Program Files/Microsoft Visual Studio" -Filter "dumpbin.exe" | Select-Object -First 1).FullName
          if (-not $dumpbin) { exit 0 }
          & $dumpbin /exports dll/build/Release/version.dll | Select-String "forwarded to"

      - uses: actions/upload-artifact@v4
        with:
          name: version-windows-x64-dll
          path: dll/build/Release/version.dll

  native-posix:
    name: Native preload (${{ matrix.os }} ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: x64
          - os: ubuntu-24.04-arm
            arch: arm64
          - os: macos-15
            arch: arm64
    steps:
      - uses: actions/checkout@v6

      - name: Install build tools (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-13 g++-13 cmake
          echo "CC=gcc-13" >> $GITHUB_ENV
          echo "CXX=g++-13" >> $GITHUB_ENV

      - name: Configure CMake
        run: cmake -S dll -B dll/build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build dll/build --parallel

      - name: Inspect output
        run: |
          ls -la dll/build/
          file dll/build/libredrover_preload.* || true

      - uses: actions/upload-artifact@v4
        with:
          name: redrover-preload-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            dll/build/libredrover_preload.so
            dll/build/libredrover_preload.dylib
          if-no-files-found: ignore
