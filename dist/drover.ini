; reDrover configuration. Lives next to Discord.exe.
;
; The GUI installer rewrites this file when you click Install — but you
; can also edit it by hand. The C++ DLL re-reads it on every Discord
; launch (and re-reads drover-packet.bin on every new UDP connection).

[drover]
; Proxy URL. Supported schemes:
;   http://[user:pass@]host:port      ← HTTP (with optional Basic auth)
;   socks5://[user:pass@]host:port    ← SOCKS5 (auth supported for UDP ASSOCIATE)
; SOCKS5-authenticated TCP CONNECT translation is not supported yet.
; Leave empty for "Direct mode" — no proxy, only UDP mangling.
proxy = http://127.0.0.1:1080

[udp]
; UDP / voice strategies — knobs for ISSUE-65-IDEAS.md.
;   off         disable all UDP mangling
;   classic     Pascal-compatible default (0x00, 0x01, sleep, original)
;   split       split the first 74-byte packet into N pieces (split_first)
;   custom      use prefix_packets / split_first below verbatim
strategy = classic
prefix_delay_ms = 50
prefix_packets = 00, 01
split_first = 0
; ISSUE-65-IDEAS.md §2.6: intentionally break the first UDP packet so
; Discord falls back to TCP voice. Lower quality, but voice "just works"
; on networks that block voice UDP entirely. Overrides `strategy`.
force_tcp_fallback = false

[socks5]
; ISSUE-65-IDEAS.md §3.2 — wrap voice UDP in SOCKS5 UDP ASSOCIATE.
; Requires a SOCKS5 server that supports UDP relaying.
; Implemented for sync receives; Windows async WSARecvFrom/IOCP remains unsupported.
udp_associate = false

[logging]
; off | error | warn | info | debug | trace
level = info
; Write messages to a file. Existing configs without this key default to true.
file_enabled = true
; Path is relative to the Discord folder and is used when file_enabled = true.
file  = drover.log
; Windows: spawn a console window via AllocConsole and mirror log
; output there (colored by level). Useful for live troubleshooting.
; POSIX: redirects to stderr (terminal). Default: off — once set,
; rate-limited to one event per voice connection at INFO level.
console = false
